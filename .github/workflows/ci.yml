name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npx biome ci .
      - name: Type-check
        run: npx tsc -b
      - name: Test
        run: npm run test
